<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Ashen Ruvinda Portfolio</title>
  <desc id="desc">Social preview image for Ashen Ruvinda's developer portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#1f3a8a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1030" cy="110" r="180" fill="#ffffff" fill-opacity="0.08" />
  <circle cx="190" cy="560" r="220" fill="#ffffff" fill-opacity="0.06" />

  <g transform="translate(110 130)">
    <rect width="90" height="90" rx="20" fill="url(#accent)" />
    <text x="45" y="61" text-anchor="middle" font-family="Mona Sans, Segoe UI, sans-serif" font-size="44" font-weight="700" fill="#0b1220">AR</text>
  </g>

  <text x="110" y="300" font-family="Mona Sans, Segoe UI, sans-serif" font-size="64" font-weight="700" fill="#ffffff">
    Ashen Ruvinda
  </text>
  <text x="110" y="360" font-family="Mona Sans, Segoe UI, sans-serif" font-size="36" font-weight="500" fill="#c7d2fe">
    Software Developer Portfolio
  </text>
  <text x="110" y="430" font-family="Mona Sans, Segoe UI, sans-serif" font-size="28" font-weight="400" fill="#dbeafe">
    Projects, GitHub Repositories, Skills, Experience, Education
  </text>

  <text x="110" y="540" font-family="Mona Sans, Segoe UI, sans-serif" font-size="24" font-weight="500" fill="#93c5fd">
    www.ashenruvinda.me
  </text>
</svg>
